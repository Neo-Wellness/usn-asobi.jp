<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>usn-asobi.jp</title>
    <meta
      name="description"
      content="usn-asobi.jp のウェブサイト準備ページです。"
    >
    <style>
      :root {
        color-scheme: light;
        --ink: #202426;
        --muted: #667074;
        --paper: #fbfaf6;
        --line: #d9ddd8;
        --accent: #087f8c;
        --accent-strong: #065e68;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--ink);
        background:
          linear-gradient(120deg, rgba(8, 127, 140, 0.08), transparent 42%),
          var(--paper);
      }

      main {
        width: min(92vw, 760px);
        padding: clamp(32px, 7vw, 72px) 0;
      }

      .eyebrow {
        margin: 0 0 14px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 620px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 2.4vw, 1.25rem);
        line-height: 1.7;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 34px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.55);
        color: var(--ink);
        font-size: 0.95rem;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Website setup</p>
      <h1>usn-asobi.jp</h1>
      <p>
        このサイトは GitHub Pages で公開するための準備中です。
        近日中にコンテンツを追加します。
      </p>
      <div class="status" aria-label="準備状況">
        <span class="dot" aria-hidden="true"></span>
        GitHub Pages custom domain configured
      </div>
    </main>
  </body>
</html>
